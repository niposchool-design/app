<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teste Supabase Connection</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <h1>Teste de Conexão Supabase</h1>
  <button onclick="testConnection()">Testar Conexão</button>
  <button onclick="testLogin()">Testar Login</button>
  <pre id="result"></pre>

  <script>
    const SUPABASE_URL = 'https://eehidnwlwrzqzgytbfsd.supabase.co'
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlaGlkbndsd3J6cXpneXRiZnNkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDgyMzA1MjQsImV4cCI6MjA2MzgwNjUyNH0.SawTk_G0H8CYFEQ7h62Wsv35uNqZz0Q5rsLNT5wCcUM'

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

    async function testConnection() {
      const result = document.getElementById('result')
      result.textContent = 'Testando conexão...\n'

      try {
        // Teste 1: Verificar se o Supabase responde
        result.textContent += '\n1. Testando URL do Supabase...\n'
        try {
          const response = await fetch(SUPABASE_URL)
          result.textContent += `   Status: ${response.status}\n`
          result.textContent += `   OK: ${response.ok}\n`
        } catch (fetchError) {
          result.textContent += `   ❌ Erro no fetch: ${fetchError.message}\n`
        }

        // Teste 1b: Testar URL com /rest/v1
        result.textContent += '\n1b. Testando URL com /rest/v1...\n'
        try {
          const response2 = await fetch(SUPABASE_URL + '/rest/v1/')
          result.textContent += `   Status: ${response2.status}\n`
          result.textContent += `   OK: ${response2.ok}\n`
        } catch (fetchError2) {
          result.textContent += `   ❌ Erro no fetch: ${fetchError2.message}\n`
        }

        // Teste 2: Verificar sessão
        result.textContent += '\n2. Verificando sessão...\n'
        const { data: sessionData, error: sessionError } = await supabase.auth.getSession()
        if (sessionError) {
          result.textContent += `   ❌ Erro: ${sessionError.message}\n`
        } else {
          result.textContent += `   ✅ Session: ${sessionData.session ? 'Ativa' : 'Nenhuma'}\n`
        }

        // Teste 3: Verificar se consegue acessar tabela profiles
        result.textContent += '\n3. Testando acesso à tabela profiles...\n'
        const { data: profiles, error: profileError } = await supabase
          .from('profiles')
          .select('count')
          .limit(1)
        
        if (profileError) {
          result.textContent += `   ❌ Erro: ${profileError.message}\n`
          result.textContent += `   Código: ${profileError.code}\n`
        } else {
          result.textContent += `   ✅ Tabela acessível!\n`
        }

      } catch (error) {
        result.textContent += `\n❌ ERRO GERAL: ${error.message}\n`
      }
    }

    async function testLogin() {
      const result = document.getElementById('result')
      result.textContent = 'Testando login...\n'

      const email = 'junior.sax@gmail.com'
      const password = 'Kt12jyh2815t@$'

      try {
        // TESTE DIRETO COM FETCH (bypass do SDK)
        result.textContent += '\n🔵 Testando com FETCH direto (bypass SDK)...\n'
        const fetchResponse = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'apikey': SUPABASE_ANON_KEY
          },
          body: JSON.stringify({ email, password })
        })
        
        const fetchData = await fetchResponse.json()
        result.textContent += `Status: ${fetchResponse.status}\n`
        result.textContent += `Resposta: ${JSON.stringify(fetchData, null, 2)}\n\n`

        // TESTE COM SDK
        result.textContent += '\n🔵 Testando com SDK do Supabase...\n'
        console.log('Chamando signInWithPassword...')
        const startTime = Date.now()
        
        const { data, error } = await supabase.auth.signInWithPassword({
          email,
          password
        })

        const elapsed = Date.now() - startTime
        result.textContent += `\nTempo de resposta: ${elapsed}ms\n\n`

        if (error) {
          result.textContent += `❌ ERRO: ${error.message}\n`
          result.textContent += `Status: ${error.status}\n`
          result.textContent += `Código: ${error.code || 'N/A'}\n`
        } else {
          result.textContent += `✅ LOGIN OK!\n`
          result.textContent += `User ID: ${data.user?.id}\n`
          result.textContent += `Email: ${data.user?.email}\n`
        }
      } catch (error) {
        result.textContent += `\n❌ ERRO GERAL: ${error.message}\n`
      }
    }
  </script>
</body>
</html>
